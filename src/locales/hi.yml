name: Hindi

start:
  welcome: |
    <b>लाइब्रेरीहब में आपका स्वागत है 📚</b> 
    
    यह प्लेटफ़ॉर्म छात्रों को साझा करने और इन तक पहुँचने में मदद करता है: 
     • नोट्स 
     • पिछले वर्ष के प्रश्न (PYQs) 
    
    ━━━━━━━━━━━━━━━ 
    
    आप क्या कर सकते हैं: 
    📤 नोट्स/PYQs अपलोड करें 
    📚 अन्य छात्रों की मदद करें 
    🌐 अपनी सामग्री वेबसाइट पर प्रकाशित करवाएं 
    
    ━━━━━━━━━━━━━━━ 
    
    शुरू करने के लिए नीचे क्लिक करें 👇

